<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Promotion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="promo-body">

    <div class="promo-header">
        <h1 class="promo-title">Exclusive Promotion Just For You!</h1>
    </div>

    <!-- Promo Section -->
    <div class="promo-section">
        <div class="promo-text">
            <h2 class="promo-heading">Get 50% Off on Your First Purchase!</h2>
            <p class="promo-description">
                Don’t miss out on this limited-time offer. Shop now and enjoy massive savings on a wide selection of products!
            </p>
            <a href="#shop-now" class="cta-button">Shop Now</a>
        </div>
        <div class="promo-image">
            <img src="https://via.placeholder.com/500x300" alt="Promo Image" class="promo-img">
        </div>
    </div>

    <!-- Footer Section -->
    <div class="promo-footer">
        <p class="footer-text">&copy; 2025 Your Company | All rights reserved</p>
    </div>

</body>
</html>
